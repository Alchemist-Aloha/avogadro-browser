[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1280x1024x24
autorestart=true

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -nopw -forever -shared
autorestart=true
depends_on=xvfb

[program:novnc]
command=/opt/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autorestart=true
depends_on=x11vnc

[program:avogadro]
command=/usr/bin/avogadro
environment=DISPLAY=":1"
autorestart=true
depends_on=xvfb
